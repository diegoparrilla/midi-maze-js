name: Deploy to GitHub Pages

# Build the Vite static site and publish dist/ to GitHub Pages on every push to main.
# The custom domain (midimaze.sidecartridge.com) is carried by public/CNAME, which Vite
# copies into dist/ so the domain survives each Actions deploy. One-time repo setup is in
# README.md ("Deploying").

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Allow the deploy job to publish to Pages; the OIDC token authenticates the deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-flight run finish (don't cancel a live publish).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
