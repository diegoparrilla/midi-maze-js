name: Deploy to S3

# Build the Vite static site and publish dist/ to the S3 static-website bucket on every
# push to main. The bucket is served over plain HTTP (S3 website endpoint, Cloudflare
# DNS-only) on purpose: the page opens a ws:// socket to the md-MIDI2IP orchestrator, and a
# browser refuses an insecure ws:// from an HTTPS page (mixed content). One-time bucket
# setup is in README.md ("Deploying"). AWS auth mirrors md-appsbuilder (repo secrets).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-west-3
      BUCKET: midimaze.sidecartridge.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # Content-hashed assets are immutable → cache hard. index.html must never be served
      # stale, so it is excluded here and re-uploaded with no-cache below.
      - name: Sync assets to S3
        run: >
          aws s3 sync dist/ "s3://$BUCKET" --delete
          --exclude index.html
          --cache-control "public,max-age=31536000,immutable"
      - name: Upload index.html (no-cache)
        run: aws s3 cp dist/index.html "s3://$BUCKET/index.html" --cache-control "no-cache"
