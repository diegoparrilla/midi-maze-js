<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <!-- iPhone Safari has no Fullscreen API; "Add to Home Screen" launches the page
         standalone (chrome-less), which is the only real fullscreen on iOS. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MIDI Maze" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>MIDI Maze</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <main id="app">
      <canvas id="screen" width="320" height="200"></canvas>

      <!-- On-screen controls (shown only on touch / coarse-pointer devices) -->
      <div id="touch-controls" hidden>
        <div id="dpad">
          <button class="pad pad-up" data-control="up" aria-label="up">▲</button>
          <button class="pad pad-left" data-control="left" aria-label="left">◀</button>
          <button class="pad pad-right" data-control="right" aria-label="right">▶</button>
          <button class="pad pad-down" data-control="down" aria-label="down">▼</button>
        </div>
        <button id="map-btn" aria-label="toggle map">MAP</button>
        <button id="fire-btn" data-control="fire" aria-label="fire">●</button>
        <button id="menu-btn" aria-label="menu">≡</button>
      </div>

      <button id="fullscreen-btn" aria-label="fullscreen" title="Fullscreen (F)">⛶</button>
    </main>

    <div id="status"></div>

    <!-- Orientation gate: shown on touch devices held in portrait -->
    <div id="rotate-overlay" hidden>
      <div class="rotate-inner">
        <div class="rotate-icon">⟳</div>
        <p>Please rotate your device<br />to landscape to play</p>
      </div>
    </div>

    <!-- In-game menu (GEM/TOS styled) -->
    <div id="menu-overlay" hidden>
      <div class="gem-dialog gem-menu">
        <div class="gem-title"><span>MENU</span></div>
        <div class="gem-menu-body">
          <button class="gem-btn" data-action="fullscreen">Fullscreen</button>
          <button class="gem-btn" data-action="restart">Quit to lobby</button>
          <button class="gem-btn gem-default" data-action="close">Resume</button>
        </div>
      </div>
    </div>

    <!-- Lobby (EPIC-20): a GEM/TOS-styled config dialog. -->
    <div id="lobby" hidden>
      <div class="gem-dialog" role="dialog" aria-label="Game setup">
        <div class="gem-title"><span>MIDI MAZE</span></div>
        <div class="gem-body">
          <div class="grow">
            <label>Name</label>
            <input
              id="cfg-name"
              class="gem-input"
              maxlength="8"
              autocomplete="off"
              spellcheck="false"
            />
          </div>
          <div class="grow">
            <label>Maze</label>
            <span class="gem-sel">
              <button class="gem-btn" data-maze="-1" aria-label="previous maze">&lsaquo;</button>
              <b class="maze-val" id="cfg-maze-val">MIDI MAZE</b>
              <button class="gem-btn" data-maze="1" aria-label="next maze">&rsaquo;</button>
            </span>
          </div>
          <div class="grow">
            <label>Reload</label>
            <span class="gem-radios" data-radio="reload">
              <button class="gem-radio" data-val="fast">Fast</button>
              <button class="gem-radio" data-val="slow">Slow</button>
            </span>
          </div>
          <div class="grow">
            <label>Regen</label>
            <span class="gem-radios" data-radio="regen">
              <button class="gem-radio" data-val="fast">Fast</button>
              <button class="gem-radio" data-val="slow">Slow</button>
            </span>
          </div>
          <div class="grow">
            <label>Revive</label>
            <span class="gem-radios" data-radio="revive">
              <button class="gem-radio" data-val="fast">Fast</button>
              <button class="gem-radio" data-val="slow">Slow</button>
            </span>
          </div>
          <div class="grow">
            <label>Lives</label>
            <span class="gem-radios" data-radio="lives">
              <button class="gem-radio" data-val="1">1</button>
              <button class="gem-radio" data-val="2">2</button>
              <button class="gem-radio" data-val="3">3</button>
            </span>
          </div>
          <div class="grow">
            <label>Friendly fire</label>
            <button class="gem-check" data-check="friendly" aria-label="friendly fire"></button>
          </div>
          <div class="grow">
            <label>Teams</label>
            <button class="gem-check" data-check="teams" aria-label="teams"></button>
          </div>
          <div class="grow">
            <label>Target drones</label>
            <span class="gem-step">
              <button class="gem-btn" data-drone-dn="0">&minus;</button>
              <b data-drone="0">0</b>
              <button class="gem-btn" data-drone-up="0">+</button>
            </span>
          </div>
          <div class="grow">
            <label>Standard drones</label>
            <span class="gem-step">
              <button class="gem-btn" data-drone-dn="1">&minus;</button>
              <b data-drone="1">0</b>
              <button class="gem-btn" data-drone-up="1">+</button>
            </span>
          </div>
          <div class="grow">
            <label>Ninja drones</label>
            <span class="gem-step">
              <button class="gem-btn" data-drone-dn="2">&minus;</button>
              <b data-drone="2">0</b>
              <button class="gem-btn" data-drone-up="2">+</button>
            </span>
          </div>
        </div>
        <div class="gem-actions">
          <button id="lobby-start" class="gem-btn gem-default">Start</button>
        </div>
      </div>
    </div>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
